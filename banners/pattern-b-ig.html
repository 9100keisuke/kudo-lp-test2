<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Noto+Serif+JP:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1080px; overflow: hidden; }
.banner {
  width: 1080px; height: 1080px;
  background: linear-gradient(180deg, #0a0a0a 0%, #0f172a 50%, #0a0a0a 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  font-family: 'Noto Sans JP', sans-serif;
  color: #fff;
  text-align: center;
  padding: 80px 60px;
}
.banner::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at 50% 30%, rgba(37,99,235,0.1) 0%, transparent 60%);
}
.content {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%;
  gap: 28px;
}
.tag {
  display: inline-block;
  background: rgba(37,99,235,0.15);
  border: 1px solid rgba(37,99,235,0.3);
  border-radius: 100px;
  padding: 8px 24px;
  font-size: 13px;
  color: #60a5fa;
  letter-spacing: 0.15em;
  font-weight: 700;
}
h1 {
  font-family: 'Noto Serif JP', serif;
  font-size: 50px;
  font-weight: 900;
  line-height: 1.4;
}
.accent { color: #60a5fa; }
.sub {
  font-size: 18px;
  color: #9ca3af;
  line-height: 1.8;
}
.bold-white { color: #fff; font-weight: 700; }
.stats {
  display: flex; gap: 24px;
}
.stat {
  background: rgba(37,99,235,0.1);
  border: 1px solid rgba(37,99,235,0.2);
  border-radius: 20px;
  padding: 20px 28px;
  text-align: center;
}
.stat-num {
  font-size: 32px;
  font-weight: 900;
  color: #60a5fa;
}
.stat-label {
  font-size: 11px;
  color: #6b7280;
  margin-top: 4px;
}
.cta-btn {
  background: #2563eb;
  color: #fff;
  font-weight: 900;
  font-size: 18px;
  padding: 20px 50px;
  border-radius: 100px;
  box-shadow: 0 0 30px rgba(37,99,235,0.3);
}
.free-tag {
  font-size: 12px;
  color: #6b7280;
}
</style>
</head>
<body>
<div class="banner">
  <div class="content">
    <div class="tag">NEUROSCIENCE × LUCK ENGINEERING</div>
    <h1>真面目な人が<br><span class="accent">運を上げる</span><br>ための技術</h1>
    <p class="sub">運は才能じゃない。<span class="bold-white">技術だ。</span></p>
    <div class="stats">
      <div class="stat">
        <p class="stat-num">3x</p>
        <p class="stat-label">チャンス認知率</p>
      </div>
      <div class="stat">
        <p class="stat-num">28日</p>
        <p class="stat-label">脳の書き換え</p>
      </div>
      <div class="stat">
        <p class="stat-num">87%</p>
        <p class="stat-label">運も実力のうち</p>
      </div>
    </div>
    <div class="cta-btn">無料で技術を学ぶ</div>
    <p class="free-tag">※メールアドレスのみで登録できます</p>
  </div>
</div>
</body></html>
