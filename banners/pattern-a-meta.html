<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Noto+Serif+JP:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 628px; overflow: hidden; }
.banner { width: 1200px; height: 628px; background: linear-gradient(135deg, #fffdf7 0%, #fef3e2 50%, #faf0f4 100%); display: flex; align-items: center; position: relative; overflow: hidden; font-family: 'Noto Sans JP', sans-serif; color: #1a1a2e; }
.banner::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse at 30% 40%, rgba(184,134,11,0.08) 0%, transparent 60%); }
.orb1 { position: absolute; width: 200px; height: 200px; border-radius: 50%; background: rgba(184,134,11,0.06); filter: blur(40px); top: -50px; right: 100px; }
.orb2 { position: absolute; width: 150px; height: 150px; border-radius: 50%; background: rgba(180,130,200,0.06); filter: blur(40px); bottom: -30px; left: 50px; }
.content { position: relative; z-index: 1; display: flex; align-items: center; gap: 60px; padding: 0 80px; width: 100%; }
.left { flex: 1; }
.tag { display: inline-block; background: rgba(184,134,11,0.1); border: 1px solid rgba(184,134,11,0.2); border-radius: 100px; padding: 6px 18px; font-size: 11px; color: #b8860b; letter-spacing: 0.15em; margin-bottom: 20px; font-weight: 700; }
h1 { font-family: 'Noto Serif JP', serif; font-size: 42px; font-weight: 900; line-height: 1.35; margin-bottom: 16px; color: #1a1a2e; }
.gold { color: #b8860b; }
.sub { font-size: 16px; color: rgba(26,26,46,0.6); line-height: 1.7; }
.right { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 16px; }
.cta-btn { background: #b8860b; color: #fff; font-weight: 900; font-size: 16px; padding: 16px 40px; border-radius: 100px; box-shadow: 0 0 30px rgba(184,134,11,0.25); }
.author-name { font-weight: 700; font-size: 14px; color: #b8860b; }
.author-title { font-size: 11px; color: rgba(26,26,46,0.45); margin-top: 2px; }
.line-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: linear-gradient(180deg, transparent, #b8860b, transparent); }
</style></head><body>
<div class="banner">
  <div class="line-accent"></div>
  <div class="orb1"></div><div class="orb2"></div>
  <div class="content">
    <div class="left">
      <div class="tag">Harvard Neuroscience × Luck Design</div>
      <h1>なぜ、<span class="gold">真面目な人</span>ほど<br>運が悪くなるのか？</h1>
      <p class="sub">脳が"正解"を探すほど、人生のチャンスは見えなくなる。<br>正解探しをやめた人から、「なぜかうまくいく」が始まる。</p>
    </div>
    <div class="right">
      <div class="cta-btn">無料で詳細を受け取る</div>
      <div style="text-align:center">
        <p class="author-name">工藤圭介</p>
        <p class="author-title">ハーバード大学 脳神経科学プログラム修了</p>
      </div>
    </div>
  </div>
</div></body></html>
