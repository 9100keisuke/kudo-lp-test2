<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Noto+Serif+JP:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1080px; overflow: hidden; }
.banner { width: 1080px; height: 1080px; background: linear-gradient(180deg, #f7fdf9 0%, #ecfdf5 40%, #d1fae5 60%, #f7fdf9 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; font-family: 'Noto Sans JP', sans-serif; color: #064e3b; text-align: center; padding: 80px 60px; }
.banner::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse at 50% 35%, rgba(5,150,105,0.06) 0%, transparent 60%); }
.orb1 { position: absolute; width: 200px; height: 200px; border-radius: 50%; background: rgba(5,150,105,0.05); filter: blur(50px); top: 80px; left: 40px; }
.orb2 { position: absolute; width: 150px; height: 150px; border-radius: 50%; background: rgba(59,130,246,0.03); filter: blur(40px); bottom: 100px; right: 40px; }
.content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 24px; }
.tag { display: inline-block; background: rgba(5,150,105,0.08); border: 1px solid rgba(5,150,105,0.15); border-radius: 100px; padding: 8px 24px; font-size: 13px; color: #059669; letter-spacing: 0.15em; font-weight: 700; }
h1 { font-family: 'Noto Serif JP', serif; font-size: 64px; font-weight: 900; line-height: 1.3; color: #064e3b; }
.accent { color: #059669; }
.subtitle { font-size: 26px; font-weight: 700; color: rgba(6,78,59,0.8); }
.sub { font-size: 18px; color: rgba(6,78,59,0.55); line-height: 1.8; }
.bold-dark { color: #064e3b; font-weight: 700; }
.compare { display: flex; gap: 20px; }
.compare-box { border-radius: 20px; padding: 20px 24px; text-align: center; width: 200px; }
.compare-bad { background: rgba(239,68,68,0.05); border: 1px solid rgba(239,68,68,0.1); }
.compare-good { background: rgba(5,150,105,0.05); border: 1px solid rgba(5,150,105,0.1); }
.compare-label { font-size: 13px; font-weight: 700; margin-bottom: 10px; }
.compare-bad .compare-label { color: #dc2626; }
.compare-good .compare-label { color: #059669; }
.compare-item { font-size: 12px; color: rgba(6,78,59,0.45); margin-bottom: 5px; }
.cta-btn { background: #059669; color: #fff; font-weight: 900; font-size: 18px; padding: 20px 50px; border-radius: 100px; box-shadow: 0 0 30px rgba(5,150,105,0.25); }
</style></head><body>
<div class="banner">
  <div class="orb1"></div><div class="orb2"></div>
  <div class="content">
    <div class="tag">脳神経科学 × 気づきの科学</div>
    <h1><span class="accent">気づき力</span></h1>
    <p class="subtitle">チャンスに気づける脳の作り方</p>
    <p class="sub">運がいい人と悪い人の違いは、たった一つ。<br><span class="bold-dark">目の前のチャンスに「気づけるか」どうか。</span></p>
    <div class="compare">
      <div class="compare-box compare-bad"><p class="compare-label">正解探しモード</p><p class="compare-item">視野が狭い</p><p class="compare-item">想定外をフィルター</p><p class="compare-item">→ 運が悪い人の脳</p></div>
      <div class="compare-box compare-good"><p class="compare-label">気づきモード</p><p class="compare-item">違和感を拾う</p><p class="compare-item">偶然を兆候として読む</p><p class="compare-item">→ 運がいい人の脳</p></div>
    </div>
    <div class="cta-btn">気づき力を手に入れる</div>
  </div>
</div></body></html>
