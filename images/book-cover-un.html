<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Shippori+Mincho+B1:wght@500;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 600px; height: 850px; overflow: hidden; }

.cover {
  width: 600px; height: 850px;
  position: relative; overflow: hidden;
  background: #fff;
}

/* ===== 右側：巨大縦書きタイトル ===== */
.big-title {
  position: absolute;
  top: 32px; right: 20px;
  bottom: 170px;
  writing-mode: vertical-rl;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 86px;
  font-weight: 900;
  color: #1a1a1a;
  letter-spacing: 0.02em;
  line-height: 1.15;
  z-index: 1;
}
.big-title .accent { color: #c4960a; }

/* ===== 著者名 ===== */
.author-area {
  position: absolute;
  top: 38px; right: 216px;
  z-index: 1;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}

.name-en {
  writing-mode: vertical-rl;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 8px; font-weight: 400;
  color: #bbb;
  letter-spacing: 0.1em;
}

.name-ja {
  writing-mode: vertical-rl;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 20px; font-weight: 700;
  color: #1a1a1a;
  letter-spacing: 0.3em;
}

/* ===== 左上：メインコピー ===== */
.left-copy {
  position: absolute;
  top: 50px; left: 36px;
  width: 240px;
  z-index: 1;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 16px; font-weight: 500;
  color: #444;
  line-height: 2.1;
  letter-spacing: 0.02em;
  border-left: 3px solid #c4960a;
  padding-left: 16px;
}

/* ===== 左中：ハーバード ===== */
.left-harvard {
  position: absolute;
  top: 260px; left: 36px;
  width: 250px;
  z-index: 1;
}

.left-harvard .label {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 10px; font-weight: 400;
  color: #b0a080;
  letter-spacing: 0.15em;
  margin-bottom: 10px;
}

.left-harvard .text {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 15px; font-weight: 500;
  color: #333;
  line-height: 2;
  letter-spacing: 0.02em;
}

/* ===== 左下：問いかけ ===== */
.left-catch {
  position: absolute;
  bottom: 195px; left: 36px;
  width: 260px;
  z-index: 1;
}

.left-catch p {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px; font-weight: 700;
  color: #1a1a1a;
  line-height: 1.9;
}
.left-catch .gold { color: #c4960a; }

/* ===== 帯（おび） ===== */
.obi {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 158px;
  background: #1a1a1a;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  padding: 0 40px;
}

.obi::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent 5%, #c4960a 35%, #dfc06a 50%, #c4960a 65%, transparent 95%);
}

.obi-top {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 10px; font-weight: 500;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.35em;
  margin-bottom: 10px;
}

.obi-main {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 19px; font-weight: 700;
  color: #fff;
  text-align: center;
  line-height: 1.8;
}
.obi-main .gold { color: #dfc06a; }

.obi-number {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 9.5px; font-weight: 400;
  color: rgba(255,255,255,0.25);
  letter-spacing: 0.2em;
  margin-top: 12px;
}

.obi-publisher {
  position: absolute;
  bottom: 10px; right: 16px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 9px; color: rgba(255,255,255,0.18);
  letter-spacing: 0.12em;
}
</style></head><body>
<div class="cover">

  <!-- 右：巨大縦書き -->
  <div class="big-title">
    真面目な人ほど<br><span class="accent">運</span>が悪くなる
  </div>

  <!-- 著者名 -->
  <div class="author-area">
    <span class="name-en">Kudo Keisuke</span>
    <span class="name-ja">工藤圭介</span>
  </div>

  <!-- 左上：コピー -->
  <div class="left-copy">
    脳が"正解"を探すほど、<br>
    人生のチャンスは<br>
    見えなくなる。
  </div>

  <!-- 左中：ハーバード -->
  <div class="left-harvard">
    <p class="label">Harvard Neuroscience</p>
    <p class="text">
      ハーバード脳神経科学が<br>
      解き明かした<br>
      「運がいい人」の脳の使い方
    </p>
  </div>

  <!-- 左下：問いかけ -->
  <div class="left-catch">
    <p>
      なぜ、<span class="gold">正解探し</span>を<br>
      やめた人から<br>
      「うまくいく」が始まるのか？
    </p>
  </div>

  <!-- 帯 -->
  <div class="obi">
    <p class="obi-top">「変わらない勇気」著者 最新刊</p>
    <p class="obi-main">
      あなたの<span class="gold">「運の悪さ」</span>は、<br>
      脳のクセが作っていた。
    </p>
    <p class="obi-number">脳科学 × 行動経済学 × 東洋哲学</p>
    <p class="obi-publisher">扶桑社</p>
  </div>

</div></body></html>
